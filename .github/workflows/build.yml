name: TelegramVault CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  NDK_VERSION:    "29.0.14206865"   # NDK r29 — latest stable
  JAVA_VERSION:   "17"
  GRADLE_VERSION: "8.14"

jobs:
  # ══════════════════════════════════════════════
  # JOB 1 — Build & cache TDLib
  # ══════════════════════════════════════════════
  tdlib:
    name: "📦 TDLib (latest master)"
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
      tdlib-sha: ${{ steps.get-sha.outputs.sha }}

    steps:
      - name: Get TDLib latest SHA
        id: get-sha
        run: |
          SHA=$(git ls-remote https://github.com/tdlib/td.git HEAD \
                | cut -f1 | cut -c1-12)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "TDLib HEAD: $SHA"

      - name: Check TDLib cache
        id: cache
        uses: actions/cache@v4
        with:
          path: tdlib-out
          key: tdlib-sha-${{ steps.get-sha.outputs.sha }}-ndk${{ env.NDK_VERSION }}-r3

      # ── تثبيت المتطلبات ───────────────────────
      - name: Install system deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build gperf \
            libssl-dev zlib1g-dev \
            openjdk-17-jdk \
            php-cli perl

      - name: Setup Android SDK
        if: steps.cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK r29 + CMake 3.22.1
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # NDK r29 مطلوب للبناء
          yes | sdkmanager "ndk;${{ env.NDK_VERSION }}" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true
          # CMake 3.22.1 مطلوب صراحةً من سكريبتات TDLib
          yes | sdkmanager "cmake;3.22.1" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true
          # platform android-34 مطلوب من سكريبتات TDLib
          yes | sdkmanager "platforms;android-34" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true

      # ── clone TDLib ───────────────────────────
      - name: Clone TDLib
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # TDLib لا يستخدم version tags — نستخدم master مباشرة
          git clone --depth=1 https://github.com/tdlib/td.git tdlib
          echo "Cloned TDLib @ $(git -C tdlib rev-parse HEAD)"

      # ── بناء OpenSSL ─────────────────────────
      # السكريبتات يجب تنفيذها من داخل tdlib/example/android
      # build-openssl.sh تُنشئ مجلد "openssl" في نفس المجلد
      # build-tdlib.sh تبحث عن "openssl" في نفس المجلد تلقائياً
      - name: Build OpenSSL for Android
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: tdlib/example/android
        run: |
          # المعاملات: [android_sdk_path] [ndk_version]
          # الناتج: ./openssl/ (ينشأ تلقائياً في نفس المجلد)
          ./build-openssl.sh "$ANDROID_HOME" "${{ env.NDK_VERSION }}"
          echo "✅ OpenSSL built at: $(ls -d openssl 2>/dev/null || echo 'NOT FOUND')"

      # ── بناء TDLib ────────────────────────────
      - name: Build TDLib for Android
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: tdlib/example/android
        run: |
          # المعاملات: [android_sdk_path] [ndk_version]
          # يجد openssl/ تلقائياً في نفس المجلد (بدون تمرير مسار)
          # يولّد الكود التلقائي (mime_type_to_extension.cpp ...) ثم يبني
          ./build-tdlib.sh "$ANDROID_HOME" "${{ env.NDK_VERSION }}"

      # ── جمع المخرجات ─────────────────────────
      - name: Collect TDLib outputs
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p tdlib-out/jniLibs tdlib-out/jar

          # مسار المخرجات الرسمي: tdlib/example/android/tdlib/libs/
          LIBS_DIR="tdlib/example/android/tdlib/libs"

          for ABI in arm64-v8a armeabi-v7a x86_64 x86; do
            SRC="$LIBS_DIR/$ABI"
            if [ -d "$SRC" ]; then
              mkdir -p "tdlib-out/jniLibs/$ABI"
              cp -v "$SRC"/*.so "tdlib-out/jniLibs/$ABI/" 2>/dev/null || true
              echo "✅ $ABI: $(ls tdlib-out/jniLibs/$ABI/)"
            else
              echo "⚠️ $ABI not found at $SRC"
            fi
          done

          # tdlib.jar
          JAR=$(find tdlib/example/android/tdlib -name "tdlib.jar" 2>/dev/null | head -1)
          if [ -n "$JAR" ]; then
            cp -v "$JAR" tdlib-out/jar/tdlib.jar
            echo "✅ jar: $(ls -sh tdlib-out/jar/tdlib.jar)"
          else
            echo "⚠️ tdlib.jar not found — will use stub classes"
          fi

          echo "--- Final output structure ---"
          find tdlib-out -type f | sort

      - name: Save TDLib cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: tdlib-out
          key: tdlib-sha-${{ steps.get-sha.outputs.sha }}-ndk${{ env.NDK_VERSION }}-r3

      - name: Upload TDLib artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-${{ steps.get-sha.outputs.sha }}
          path: tdlib-out/
          retention-days: 30

  # ══════════════════════════════════════════════
  # JOB 2 — Build Android app
  # ══════════════════════════════════════════════
  build:
    name: "🔨 Build APK (${{ github.event.inputs.build_type || 'debug' }})"
    runs-on: ubuntu-latest
    needs: tdlib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      # ── استعادة TDLib ─────────────────────────
      - name: Restore TDLib cache
        id: tdlib-cache
        uses: actions/cache@v4
        with:
          path: tdlib-out
          key: tdlib-sha-${{ needs.tdlib.outputs.tdlib-sha }}-ndk${{ env.NDK_VERSION }}-r3

      - name: Download TDLib artifact (fallback)
        if: steps.tdlib-cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: tdlib-${{ needs.tdlib.outputs.tdlib-sha }}
          path: tdlib-out

      - name: Install TDLib into project
        run: |
          echo "📦 Installing TDLib…"
          if [ -d tdlib-out/jniLibs ]; then
            mkdir -p app/src/main/jniLibs
            cp -rv tdlib-out/jniLibs/* app/src/main/jniLibs/
            echo "✅ .so files:"
            find app/src/main/jniLibs -name "*.so" | xargs ls -sh
          fi
          if [ -f tdlib-out/jar/tdlib.jar ]; then
            mkdir -p app/libs
            cp tdlib-out/jar/tdlib.jar app/libs/tdlib.jar
            echo "✅ tdlib.jar: $(ls -sh app/libs/tdlib.jar)"
            rm -f app/src/main/java/org/drinkless/tdlib/Client.kt
            rm -f app/src/main/java/org/drinkless/tdlib/TdApi.kt
          else
            echo "⚠️  No jar — keeping stub classes (no-op TDLib)"
          fi

      # ── Credentials ───────────────────────────
      - name: Write local.properties
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "tg.api.id=${{ secrets.TG_API_ID }}"
            echo "tg.api.hash=${{ secrets.TG_API_HASH }}"
          } > local.properties

      # ── Lint ──────────────────────────────────
      - name: Lint
        run: ./gradlew lint --no-daemon --continue
        continue-on-error: true

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

      # ── Unit tests ────────────────────────────
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --continue
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/test-results/

      # ── Build ─────────────────────────────────
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Pandroid.debug.obsoleteApi=true

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Upload APK ────────────────────────────
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: TelegramVault-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: TelegramVault-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 60

      # ── Summary ───────────────────────────────
      - name: Job summary
        if: always()
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          SIZE=$([ -f "$APK" ] && ls -sh "$APK" | awk '{print $1}' || echo "N/A")
          {
            echo "## 🚀 Build #${{ github.run_number }}"
            echo "| | |"
            echo "|---|---|"
            echo "| Commit | \`${GITHUB_SHA:0:8}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Type | \`${{ github.event.inputs.build_type || 'debug' }}\` |"
            echo "| TDLib | \`master @ ${{ needs.tdlib.outputs.tdlib-sha }}\` |"
            echo "| NDK | \`r29 (${{ env.NDK_VERSION }})\` |"
            echo "| APK size | \`$SIZE\` |"
          } >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════
  # JOB 3 — GitHub Release (on version tags)
  # ══════════════════════════════════════════════
  release:
    name: "🎉 Release"
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          pattern: TelegramVault-release-*
          merge-multiple: true
          path: apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Telegram Vault ${{ github.ref_name }}"
          body: |
            ## Telegram Vault ${{ github.ref_name }}

            ### التثبيت
            1. حمّل `TelegramVault-release.apk`
            2. فعّل "مصادر غير معروفة" في الإعدادات
            3. ثبّت واستمتع 🚀

            ### المتطلبات
            - Android 5.0+ (API 21)
            - مساحة حرة 50 MB
          files: apks/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') }}

